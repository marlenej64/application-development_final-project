<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Impact Viewer | Austria</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.3.1/ol.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        <div id="map"></div>

        <aside id="sidebar">
            <header>
                <h1>Climate Impact Viewer</h1>
                <p class="subtitle">Citizen Science & Soil Sealing</p>
            </header>

            <section id="analysis-box">
                <h2>Analyse-Ergebnisse</h2>
                <div id="placeholder-text">
                    Klicke auf einen Beobachtungspunkt in der Karte, um die räumliche Analyse zu starten.
                </div>
                
                <div id="results" class="hidden">
                    <div class="result-item">
                        <span class="label">Puffer-Radius:</span>
                        <span id="res-radius">500 m</span>
                    </div>
                    <div class="result-item">
                        <span class="label">Berechnete Fläche:</span>
                        <span id="res-area">-</span>
                    </div>
                    <hr>
                    <div class="result-item">
                        <span class="label">Versiegelungsgrad:</span>
                        <span id="res-sealing">-</span>
                    </div>
                    <div id="risk-badge">-</div>
                </div>
            </section>

            <footer>
                <p>Datenquelle: Climate Agents & data.gv.at</p>
            </footer>
        </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v10.3.1/dist/ol.js"></script>
    <script src="main.js"></script>
</body>
</html>
